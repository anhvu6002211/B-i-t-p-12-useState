<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Animal App</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .app {
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
    }

    /* Header */
    .header {
      height: 40px;
      background-color: #333;
      width: 100%;
    }

    /* Button Container */
    .button-container {
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .add-animal-btn {
      padding: 15px 120px;
      font-size: 18px;
      font-weight: bold;
      background-color: #90EE90;
      border: 2px solid #4CAF50;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .add-animal-btn:hover {
      background-color: #7CCD7C;
    }

    /* Animal List */
    .animal-list {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      padding: 20px;
      justify-content: flex-start;
    }

    /* Animal Card */
    .animal-card {
      position: relative;
      width: 200px;
      height: 200px;
      background-color: white;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .animal-image {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .animal-image svg {
      width: 80%;
      height: 80%;
      object-fit: contain;
    }

    .heart {
      position: absolute;
      bottom: 10px;
      right: 10px;
      width: 30px;
      height: 30px;
      cursor: pointer;
      transition: transform 0.2s ease-in-out;
    }

    .heart.large {
      transform: scale(1.5);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const animalImages = [
      { name: 'horse', image: 'horse.svg' },
      { name: 'dog', image: 'dog.svg' },
      { name: 'gator', image: 'gator.svg' },
    ];

    function InlineSVG({ src, className, alt }) {
      const [svg, setSvg] = useState(null);

      useEffect(() => {
        let mounted = true;
        fetch(src)
          .then((r) => r.text())
          .then((text) => {
            if (mounted) setSvg(text);
          })
          .catch(() => {
            if (mounted) setSvg(null);
          });
        return () => (mounted = false);
      }, [src]);

      if (!svg) return <div className={className} aria-label={alt}></div>;
      return (
        <div
          className={className}
          aria-label={alt}
          dangerouslySetInnerHTML={{ __html: svg }}
        />
      );
    }

    function HeartButton() {
      const [isLarge, setIsLarge] = useState(false);
      return (
        <img
          src="heart.svg"
          alt="heart"
          className={`heart ${isLarge ? 'large' : ''}`}
          onClick={() => setIsLarge(!isLarge)}
        />
      );
    }

    function App() {
      const [animals, setAnimals] = useState([]);

      const handleAddAnimal = () => {
        const randomIndex = Math.floor(Math.random() * animalImages.length);
        const randomAnimal = animalImages[randomIndex];

        const newAnimal = {
          ...randomAnimal,
          id: Date.now() + Math.random(),
          hasHeart: Math.random() > 0.5,
        };

        setAnimals((prev) => [...prev, newAnimal]);
      };

      return (
        <div className="app">
          <div className="header"></div>

          <div className="button-container">
            <button className="add-animal-btn" onClick={handleAddAnimal}>
              Add Animal
            </button>
          </div>

          <div className="animal-list">
            {animals.map((animal) => (
              <div key={animal.id} className="animal-card">
                <InlineSVG src={animal.image} alt={animal.name} className="animal-image" />
                <HeartButton />
              </div>
            ))}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
